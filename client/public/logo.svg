<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rotated square background -->
  <rect x="15" y="15" width="70" height="70" rx="16" fill="url(#grad)" transform="rotate(45 50 50)" />
  <!-- Inner square -->
  <rect x="25" y="25" width="50" height="50" rx="10" fill="#0f172a" transform="rotate(45 50 50)" />
  <!-- Text -->
  <text x="50" y="58" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="url(#grad)" text-anchor="middle">SMT</text>
</svg>