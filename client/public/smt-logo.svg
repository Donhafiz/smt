<svg width="500" height="200" viewBox="0 0 500 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- S Block -->
  <g transform="translate(25, 30)">
    <rect x="0" y="0" width="75" height="75" rx="18" fill="url(#mainGrad)" opacity="0.12"/>
    <rect x="2" y="2" width="71" height="71" rx="16" fill="url(#mainGrad)" opacity="0.08"/>
    <text x="37.5" y="53" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="url(#mainGrad)" filter="url(#glow)">S</text>
  </g>

  <!-- M Block -->
  <g transform="translate(112, 30)">
    <rect x="0" y="0" width="75" height="75" rx="18" fill="url(#mainGrad)" opacity="0.08"/>
    <rect x="2" y="2" width="71" height="71" rx="16" fill="url(#mainGrad)" opacity="0.05"/>
    <text x="37.5" y="53" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="url(#mainGrad)">M</text>
  </g>

  <!-- T Block -->
  <g transform="translate(199, 30)">
    <rect x="0" y="0" width="75" height="75" rx="18" fill="url(#mainGrad)" opacity="0.04"/>
    <text x="37.5" y="53" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="url(#mainGrad)">T</text>
  </g>

  <!-- Vertical divider -->
  <line x1="290" y1="35" x2="290" y2="105" stroke="url(#mainGrad)" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Text Stack -->
  <g transform="translate(310, 38)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="4">STAR</text>
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="url(#mainGrad)" letter-spacing="4">MEDIA</text>
    <text x="0" y="56" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff" letter-spacing="4">TECH</text>
  </g>

  <!-- Bottom accent line -->
  <line x1="310" y1="108" x2="480" y2="108" stroke="url(#mainGrad)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
</svg>